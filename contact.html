  <section class="contact">
    <div class="wrap contact__grid">

      <!-- ============ CONTACT FORM ============
           GitHub Pages is static, so the form is submitted through Formspree (free).
           1. Make an account at https://formspree.io
           2. Create a form and copy its endpoint (looks like https://formspree.io/f/abcdwxyz)
           3. Paste it into the action="" below.
           Until then the form won't send. Prefer no form? Delete this block and
           keep the "Or reach out directly" panel. -->
      <div>
        <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
          <div class="field">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" required />
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required />
          </div>
          <div class="field">
            <label for="message">Message</label>
            <textarea id="message" name="message" required></textarea>
          </div>
          <button class="btn btn--block" type="submit">Send message</button>
        </form>
      </div>

      <!-- ============ DIRECT ============ -->
      <div class="contact__direct">
        <p class="page-head__lede" style="margin-top:0">Or reach out directly:</p>
        <p><a href="mailto:duskgamesinteractive@gmail.com">duskgamesinteractive@gmail.com</a></p>
